<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pichler Capital Group — Investor Portal</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="portal.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../shared/Icon.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="Login.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Topbar.jsx"></script>
<script type="text/babel" src="Holdings.jsx"></script>
<script type="text/babel" src="Overview.jsx"></script>
<script type="text/babel" src="Portfolio.jsx"></script>
<script type="text/babel" src="Documents.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const TITLES = {
  overview: { t: 'Overview', s: 'Good afternoon, Maurus · 2 July 2026' },
  portfolio: { t: 'Portfolio', s: 'Active positions and committed capital' },
  documents: { t: 'Documents', s: 'Statements, letters and memos' },
  settings: { t: 'Settings', s: 'Account preferences' },
};

function App() {
  const [authed, setAuthed] = React.useState(false);
  const [tab, setTab] = React.useState('overview');
  const [holding, setHolding] = React.useState(null);

  if (!authed) return <Login onEnter={() => setAuthed(true)} />;

  const open = (h) => { if (h) { setHolding(h); } else { setTab('portfolio'); } };
  const meta = TITLES[tab];

  return (
    <div className="app">
      <Sidebar tab={tab} setTab={(t) => { setTab(t); setHolding(null); }} onLogout={() => setAuthed(false)} />
      <div className="main">
        <Topbar title={meta.t} subtitle={meta.s} />
        {tab === 'overview' && <Overview onOpen={open} />}
        {tab === 'portfolio' && <Portfolio onOpen={open} />}
        {tab === 'documents' && <Documents />}
        {tab === 'settings' && <Settings />}
      </div>
      <OpportunityDrawer holding={holding} onClose={() => setHolding(null)} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
