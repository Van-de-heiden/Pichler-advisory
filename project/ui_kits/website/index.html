<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pichler Capital Group</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="website.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../shared/Icon.jsx"></script>
<script type="text/babel" src="../shared/ImagePlate.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Approach.jsx"></script>
<script type="text/babel" src="Thesis.jsx"></script>
<script type="text/babel" src="FocusAreas.jsx"></script>
<script type="text/babel" src="TrackRecord.jsx"></script>
<script type="text/babel" src="CTAFooter.jsx"></script>
<script type="text/babel" src="ContactModal.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function App() {
  const [scrolled, setScrolled] = React.useState(false);
  const [contactOpen, setContactOpen] = React.useState(false);

  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 24);
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
    document.querySelectorAll('.reveal').forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);

  const openContact = () => setContactOpen(true);
  const goLogin = () => { window.location.href = '../portal/index.html'; };

  return (
    <React.Fragment>
      <Nav onContact={openContact} onLogin={goLogin} scrolled={scrolled} />
      <main>
        <Hero onContact={openContact} />
        <Approach />
        <Thesis />
        <FocusAreas />
        <TrackRecord />
        <CTAFooter onContact={openContact} />
      </main>
      <ContactModal open={contactOpen} onClose={() => setContactOpen(false)} />
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
