<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--base-white); padding: 24px 28px; font-family: var(--font-body); display: flex; align-items: center; gap: 28px; }
  .shield { height: 150px; }
  .meta { max-width: 50%; }
  .t { font-family: var(--font-display); font-size: 24px; font-weight: 500; color: var(--ink); margin: 0 0 8px; }
  .d { font-size: 13px; line-height: 1.6; color: var(--slate); margin: 0; }
  .uses { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--taupe); margin-top: 12px; }
</style>
</head>
<body>
  <img class="shield" src="../assets/pcg-shield.png" alt="PCG shield monogram">
  <div class="meta">
    <h3 class="t">The shield mark</h3>
    <p class="d">The interlocking "PC" monogram inside a fine double-rule crest. Used alone at avatar and favicon scale, or paired with the wordmark.</p>
    <div class="uses">Avatar · favicon · app icon · stamp</div>
  </div>
</body>
</html>
