<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--base-white); padding: 24px 28px; font-family: var(--font-body); }
  .meta { font-size: 11px; color: var(--taupe); letter-spacing: 0.06em; }
  .spec { color: var(--ink); font-family: var(--font-display); font-weight: 500; line-height: 1; margin: 2px 0 16px; }
  .a { font-size: 56px; letter-spacing: -0.035em; }
  .b { font-size: 32px; letter-spacing: -0.02em; }
  .c { font-size: 22px; font-style: italic; font-weight: 500; color: var(--bordeaux-700); margin-bottom: 0; }
</style>
</head>
<body>
  <div class="meta">CORMORANT GARAMOND · DISPLAY · 500 / −0.035em</div>
  <div class="spec a">Capital deserves discipline</div>
  <div class="meta">CORMORANT GARAMOND · HEADING · 500</div>
  <div class="spec b">Measured conviction, precisely expressed</div>
  <div class="meta">CORMORANT GARAMOND · ITALIC · accents &amp; pull quotes</div>
  <div class="spec c">Enduring value, built for generations</div>
</body>
</html>
