<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--base-white); padding: 26px 28px; font-family: var(--font-body); }
  .lbl { font-family: var(--font-display); font-size: 22px; font-weight: 500; color: var(--ink); margin-bottom: 16px; }
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .btn { font-family: var(--font-body); font-size: 15px; font-weight: 600; letter-spacing: 0.01em; padding: 12px 24px; border-radius: var(--radius-pill); border: 1px solid transparent; cursor: pointer;
    transition: background-color var(--duration-base) var(--ease-standard), transform var(--duration-base) var(--ease-standard), box-shadow var(--duration-base) var(--ease-standard), border-color var(--duration-base) var(--ease-standard), color var(--duration-base) var(--ease-standard); }
  .btn:hover { transform: translateY(-1px); }
  .primary { background: var(--bordeaux-700); color: #fff; box-shadow: var(--shadow-brand); }
  .primary:hover { background: var(--bordeaux-800); }
  .secondary { background: var(--charcoal); color: var(--base-ivory); }
  .secondary:hover { background: var(--ink); }
  .outline { background: transparent; color: var(--ink); border-color: var(--stone); }
  .outline:hover { border-color: var(--ink); }
  .ghost { background: transparent; color: var(--bordeaux-700); padding-left: 6px; padding-right: 6px; }
  .ghost:hover { color: var(--bordeaux-800); }
  .arrow { margin-left: 6px; }
</style>
</head>
<body>
  <div class="lbl">Buttons</div>
  <div class="row">
    <button class="btn primary">Review opportunities</button>
    <button class="btn secondary">Investor login</button>
    <button class="btn outline">Learn more</button>
    <button class="btn ghost">Explore the thesis<span class="arrow">→</span></button>
  </div>
</body>
</html>
