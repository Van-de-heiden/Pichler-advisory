<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--base-ivory); padding: 28px 32px; font-family: var(--font-body); }
  .eyebrow { margin-bottom: 14px; display: block; }
  .head { font-family: var(--font-display); font-size: 40px; line-height: 1.04; letter-spacing: -0.03em; font-weight: 500; color: var(--ink); margin: 0 0 14px; max-width: 14ch; }
  .head em { color: var(--bordeaux-700); font-style: italic; }
  .para { font-size: 16px; line-height: 1.65; color: var(--slate); max-width: 58ch; margin: 0; }
</style>
</head>
<body>
  <span class="eyebrow">Private capital, allocated with discipline</span>
  <h2 class="head">A quiet, precise house for <em>serious capital</em>.</h2>
  <p class="para">Pichler Capital Group develops and evaluates opportunities with entrepreneurial judgment, rigorous analysis and long-term intent. Headlines may impress; body text must serve.</p>
</body>
</html>
