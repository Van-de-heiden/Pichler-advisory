<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--base-white); padding: 22px 26px; font-family: var(--font-body); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; box-sizing: border-box; }
  .sw .n { font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
  .sw .h { font-size: 10px; font-family: var(--font-body); opacity: 0.8; margin-top: 2px; }
  .lbl { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
  .lbl .t { font-family: var(--font-display); font-size: 22px; font-weight: 500; color: var(--ink); }
  .lbl .d { font-size: 12px; color: var(--slate); }
  .star { color: var(--bordeaux-700); }
</style>
</head>
<body>
  <div class="lbl"><span class="t">Bordeaux</span><span class="d">Signature brand colour — anchors, never floods (3–8%)</span></div>
  <div class="row">
    <div class="sw" style="background:var(--bordeaux-50); color:var(--bordeaux-800)"><span class="n">50</span><span class="h">#F7EDEF</span></div>
    <div class="sw" style="background:var(--bordeaux-100); color:var(--bordeaux-800)"><span class="n">100</span><span class="h">#E8C9CF</span></div>
    <div class="sw" style="background:var(--bordeaux-300); color:#fff"><span class="n">300</span><span class="h">#B45C6A</span></div>
    <div class="sw" style="background:var(--bordeaux-500); color:#fff"><span class="n">500</span><span class="h">#7A1D2B</span></div>
    <div class="sw" style="background:var(--bordeaux-600); color:#fff"><span class="n">600</span><span class="h">#6A1523</span></div>
    <div class="sw" style="background:var(--bordeaux-700); color:#fff"><span class="n">700 ★</span><span class="h">#5A0F1B</span></div>
    <div class="sw" style="background:var(--bordeaux-800); color:#fff"><span class="n">800</span><span class="h">#3F0812</span></div>
    <div class="sw" style="background:var(--bordeaux-900); color:#fff"><span class="n">900</span><span class="h">#26050B</span></div>
  </div>
</body>
</html>
