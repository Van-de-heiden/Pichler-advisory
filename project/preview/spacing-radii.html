<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--base-white); padding: 22px 26px; font-family: var(--font-body); }
  .lbl { font-family: var(--font-display); font-size: 22px; font-weight: 500; color: var(--ink); margin-bottom: 4px; }
  .sub { font-size: 12px; color: var(--slate); margin-bottom: 18px; }
  .grid { display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 72px; height: 56px; background: var(--bordeaux-50); border: 1.5px solid var(--bordeaux-700); }
  .t { font-size: 11px; color: var(--slate); }
</style>
</head>
<body>
  <div class="lbl">Radii</div>
  <div class="sub">Rounded, but never playful — nothing bubbly</div>
  <div class="grid">
    <div class="item"><span class="box" style="border-radius:var(--radius-xs)"></span><span class="t">2 · xs</span></div>
    <div class="item"><span class="box" style="border-radius:var(--radius-sm)"></span><span class="t">4 · sm</span></div>
    <div class="item"><span class="box" style="border-radius:var(--radius-md)"></span><span class="t">8 · md</span></div>
    <div class="item"><span class="box" style="border-radius:var(--radius-lg)"></span><span class="t">12 · lg</span></div>
    <div class="item"><span class="box" style="border-radius:var(--radius-xl)"></span><span class="t">18 · xl</span></div>
    <div class="item"><span class="box" style="border-radius:var(--radius-pill); width:96px"></span><span class="t">pill · tags</span></div>
  </div>
</body>
</html>
