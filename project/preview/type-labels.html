<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--base-white); padding: 24px 28px; font-family: var(--font-body); display: flex; flex-direction: column; gap: 18px; }
  .grp { display: flex; align-items: center; gap: 18px; }
  .desc { font-size: 11px; color: var(--taupe); }
  .diamond { display: inline-flex; align-items: center; gap: 12px; color: var(--bordeaux-700); }
  .diamond .rule { width: 40px; height: 1px; background: var(--bordeaux-700); }
  .diamond .dia { width: 7px; height: 7px; background: var(--bordeaux-700); transform: rotate(45deg); }
</style>
</head>
<body>
  <div class="grp">
    <span class="eyebrow">Private capital</span>
    <span class="desc">.eyebrow — tracked 0.22em, Bordeaux</span>
  </div>
  <div class="grp">
    <span class="caption">Investment thesis · 2026</span>
    <span class="desc">.caption — tracked 0.12em, taupe metadata</span>
  </div>
  <div class="grp">
    <span class="diamond"><span class="rule"></span><span class="dia"></span><span class="rule"></span></span>
    <span class="desc">Signature diamond divider — the brand's editorial ornament</span>
  </div>
</body>
</html>
