<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { margin: 0; font-family: var(--font-body); }
  .dark { background: var(--charcoal); padding: 30px 32px; color: var(--base-ivory); position: relative; overflow: hidden; }
  .dark::after { content: ""; position: absolute; right: -80px; top: -80px; width: 260px; height: 260px; background: radial-gradient(circle, rgba(90,15,27,0.55), transparent 70%); }
  .eyebrow { color: var(--gold-500); letter-spacing: 0.22em; text-transform: uppercase; font-size: 11px; font-weight: 600; }
  .h { font-family: var(--font-display); font-size: 32px; font-weight: 500; letter-spacing: -0.02em; margin: 12px 0 10px; }
  .p { font-size: 14px; line-height: 1.6; color: var(--stone); max-width: 52ch; margin: 0 0 18px; position: relative; }
  .cta { display: inline-block; font-size: 13px; font-weight: 600; color: var(--charcoal); background: var(--base-ivory); padding: 9px 20px; border-radius: var(--radius-pill); text-decoration: none; }
</style>
</head>
<body>
  <div class="dark">
    <span class="eyebrow">Built to endure</span>
    <div class="h">Enduring value, quietly compounded</div>
    <p class="p">On dark premium surfaces, ivory text carries the message, stone provides muted support, and a single soft Bordeaux wash is the only permitted glow.</p>
    <a class="cta" href="#">Start a confidential conversation</a>
  </div>
</body>
</html>
