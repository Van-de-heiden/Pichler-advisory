<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--base-white); padding: 22px 26px; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .sw { height: 92px; border-radius: var(--radius-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; box-sizing: border-box; box-shadow: var(--shadow-sm); }
  .sw.bd { border: 1px solid var(--stone); }
  .sw .n { font-size: 11px; font-weight: 600; }
  .sw .h { font-size: 10px; opacity: 0.85; margin-top: 2px; }
  .lbl { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
  .lbl .t { font-family: var(--font-display); font-size: 22px; font-weight: 500; color: var(--ink); }
  .lbl .d { font-size: 12px; color: var(--slate); }
</style>
</head>
<body>
  <div class="lbl"><span class="t">Base &amp; muted gold</span><span class="d">Gold is a privilege, not a habit — hairlines &amp; tiny accents only (1–3%)</span></div>
  <div class="grid">
    <div class="sw bd" style="background:var(--base-white); color:var(--ink)"><span class="n">White</span><span class="h">#FFFFFF</span></div>
    <div class="sw bd" style="background:var(--base-ivory); color:var(--ink)"><span class="n">Ivory</span><span class="h">#F8F5EF</span></div>
    <div class="sw" style="background:var(--gold-300); color:var(--gold-700)"><span class="n">Gold 300</span><span class="h">#D8C58B</span></div>
    <div class="sw" style="background:var(--gold-500); color:#fff"><span class="n">Gold 500</span><span class="h">#B89B5E</span></div>
    <div class="sw" style="background:var(--gold-700); color:#fff"><span class="n">Gold 700</span><span class="h">#7F6736</span></div>
  </div>
</body>
</html>
