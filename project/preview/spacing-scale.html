<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--base-white); padding: 22px 26px; font-family: var(--font-body); }
  .lbl { font-family: var(--font-display); font-size: 22px; font-weight: 500; color: var(--ink); margin-bottom: 4px; }
  .sub { font-size: 12px; color: var(--slate); margin-bottom: 16px; }
  .scale { display: flex; flex-direction: column; gap: 8px; }
  .r { display: flex; align-items: center; gap: 14px; }
  .bar { height: 14px; background: var(--bordeaux-700); border-radius: 2px; }
  .t { font-size: 11px; color: var(--slate); width: 70px; }
</style>
</head>
<body>
  <div class="lbl">Spacing</div>
  <div class="sub">4px base scale — generous space is discretion made visible</div>
  <div class="scale">
    <div class="r"><span class="t">4 · space-1</span><span class="bar" style="width:4px"></span></div>
    <div class="r"><span class="t">8 · space-2</span><span class="bar" style="width:8px"></span></div>
    <div class="r"><span class="t">12 · space-3</span><span class="bar" style="width:12px"></span></div>
    <div class="r"><span class="t">16 · space-4</span><span class="bar" style="width:16px"></span></div>
    <div class="r"><span class="t">24 · space-5</span><span class="bar" style="width:24px"></span></div>
    <div class="r"><span class="t">32 · space-6</span><span class="bar" style="width:32px"></span></div>
    <div class="r"><span class="t">48 · space-7</span><span class="bar" style="width:48px"></span></div>
    <div class="r"><span class="t">64 · space-8</span><span class="bar" style="width:64px"></span></div>
    <div class="r"><span class="t">96 · space-9</span><span class="bar" style="width:96px"></span></div>
    <div class="r"><span class="t">128 · space-10</span><span class="bar" style="width:128px"></span></div>
  </div>
</body>
</html>
