<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--base-white); padding: 22px 26px; font-family: var(--font-body); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--mist); }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; box-sizing: border-box; }
  .sw .n { font-size: 11px; font-weight: 600; }
  .sw .h { font-size: 10px; opacity: 0.85; margin-top: 2px; }
  .lbl { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
  .lbl .t { font-family: var(--font-display); font-size: 22px; font-weight: 500; color: var(--ink); }
  .lbl .d { font-size: 12px; color: var(--slate); }
</style>
</head>
<body>
  <div class="lbl"><span class="t">Neutrals</span><span class="d">Ink for text, charcoal for dark surfaces, warm stone &amp; taupe for structure</span></div>
  <div class="row">
    <div class="sw" style="background:var(--ink); color:#fff"><span class="n">Ink</span><span class="h">#151417</span></div>
    <div class="sw" style="background:var(--charcoal); color:#fff"><span class="n">Charcoal</span><span class="h">#262126</span></div>
    <div class="sw" style="background:var(--graphite); color:#fff"><span class="n">Graphite</span><span class="h">#3B3638</span></div>
    <div class="sw" style="background:var(--slate); color:#fff"><span class="n">Slate</span><span class="h">#5B5558</span></div>
    <div class="sw" style="background:var(--taupe); color:#fff"><span class="n">Taupe</span><span class="h">#A99D90</span></div>
    <div class="sw" style="background:var(--stone); color:var(--ink)"><span class="n">Stone</span><span class="h">#D8D2C8</span></div>
    <div class="sw" style="background:var(--mist); color:var(--ink)"><span class="n">Mist</span><span class="h">#EEEAE3</span></div>
  </div>
</body>
</html>
