<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--base-white); padding: 22px 26px; font-family: var(--font-body); }
  .lbl { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .lbl .t { font-family: var(--font-display); font-size: 22px; font-weight: 500; color: var(--ink); }
  .lbl .d { font-size: 12px; color: var(--slate); }
  .bar { display: flex; height: 58px; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .seg { display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
  .key { display: flex; gap: 20px; margin-top: 14px; flex-wrap: wrap; }
  .k { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--slate); }
  .dot { width: 11px; height: 11px; border-radius: 3px; }
  .dot.bd { border: 1px solid var(--stone); }
</style>
</head>
<body>
  <div class="lbl"><span class="t">Usage ratio</span><span class="d">The discipline is in the proportion — this keeps the brand expensive</span></div>
  <div class="bar">
    <div class="seg" style="flex:62; background:var(--base-ivory); color:var(--ink); border-right:1px solid var(--mist)">62%</div>
    <div class="seg" style="flex:20; background:var(--ink); color:#fff">20%</div>
    <div class="seg" style="flex:9; background:var(--stone); color:var(--ink)">9%</div>
    <div class="seg" style="flex:6; background:var(--bordeaux-700); color:#fff">6%</div>
    <div class="seg" style="flex:3; background:var(--gold-500); color:#fff">3%</div>
  </div>
  <div class="key">
    <div class="k"><span class="dot bd" style="background:var(--base-ivory)"></span>White / Ivory · 55–70%</div>
    <div class="k"><span class="dot" style="background:var(--ink)"></span>Ink / Charcoal · 15–25%</div>
    <div class="k"><span class="dot" style="background:var(--stone)"></span>Stone / Mist · 5–12%</div>
    <div class="k"><span class="dot" style="background:var(--bordeaux-700)"></span>Bordeaux · 3–8%</div>
    <div class="k"><span class="dot" style="background:var(--gold-500)"></span>Gold / Semantic · 1–3%</div>
  </div>
</body>
</html>
